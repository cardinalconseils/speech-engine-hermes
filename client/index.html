<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Engine — Hermes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    #mic-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 1.5rem;
    }
    #mic-button:hover { background: #3a3a3a; }
    #mic-button.listening {
      background: #e84545;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    #status {
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2rem;
    }
    #error {
      color: #e84545;
      font-size: 0.85rem;
      min-height: 1.2rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Speech Engine</h1>
    <p class="subtitle">Powered by ElevenLabs + OpenRouter</p>
    <button id="mic-button" title="Click to talk">
      &#127908;
    </button>
    <div id="status">Click to start</div>
    <div id="error"></div>
  </div>

  <!-- React + ElevenLabs from CDN -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "@elevenlabs/react": "https://esm.sh/@elevenlabs/react@1.0.5"
    }
  }
  </script>
  <script type="module">
    import React, { useState, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { useConversation } from '@elevenlabs/react';

    function App() {
      const [errorMsg, setErrorMsg] = useState('');

      const conversation = useConversation({
        onConnect: () => {
          document.getElementById('status').textContent = 'Connected';
        },
        onDisconnect: () => {
          document.getElementById('status').textContent = 'Disconnected';
          document.getElementById('mic-button').classList.remove('listening');
        },
        onError: (error) => {
          setErrorMsg(error.message);
        },
      });

      const getToken = useCallback(async () => {
        const res = await fetch('http://localhost:3002/api/token');
        if (!res.ok) throw new Error('Failed to get token');
        const data = await res.json();
        return data.token;
      }, []);

      const toggleConversation = useCallback(async () => {
        setErrorMsg('');
        try {
          if (conversation.status === 'connected') {
            await conversation.endSession();
          } else {
            document.getElementById('status').textContent = 'Connecting...';
            await conversation.startSession({
              agentId: undefined, // not needed — token already has the engine ID
              connectionType: 'webrtc',
              getWebRTCToken: getToken,
            });
            document.getElementById('mic-button').classList.add('listening');
          }
        } catch (err) {
          setErrorMsg(err.message);
          document.getElementById('mic-button').classList.remove('listening');
          document.getElementById('status').textContent = 'Click to start';
        }
      }, [conversation, getToken]);

      return React.createElement('div', null,
        React.createElement('button', {
          id: 'mic-button',
          onClick: toggleConversation,
          className: conversation.status === 'connected' ? 'listening' : '',
        }),
        React.createElement('div', { id: 'status' },
          conversation.status === 'connected' ? 'Listening...' : 'Click to start'
        ),
        errorMsg && React.createElement('div', { id: 'error' }, errorMsg)
      );
    }

    const root = createRoot(document.body.querySelector('.container'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
